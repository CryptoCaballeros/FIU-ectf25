name: Discord Notification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  issues:
    types: [ opened, closed, reopened ]
  pull_request_review:
    types: [ submitted ]
  project_card:
    types: [ created, moved ]
  # Add any other GitHub events you want to track

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        uses: Ilshidur/action-discord@master
        if: github.event_name != 'project_card' || contains(github.event.project_card.note, 'done') || contains(github.event.project_card.column_name, 'Done')
        with:
          args: |
            📣 **New GitHub Activity**
            
            Repository: ${{ github.repository }}
            Event: ${{ github.event_name }}
            
            ${{ github.event_name == 'push' && format('**Branch:** {0}', github.ref_name) || '' }}
            ${{ github.event_name == 'pull_request' && format('**PR:** [{0}]({1}) - {2}', github.event.pull_request.title, github.event.pull_request.html_url, github.event.pull_request.state) || '' }}
            ${{ github.event_name == 'issues' && format('**Issue:** [{0}]({1}) - {2}', github.event.issue.title, github.event.issue.html_url, github.event.issue.state) || '' }}
            ${{ github.event_name == 'pull_request_review' && format('**PR Review:** [{0}]({1}) - {2}', github.event.pull_request.title, github.event.pull_request.html_url, github.event.review.state) || '' }}
            ${{ github.event_name == 'project_card' && format('**Project Card Update:** Card {0} to column: {1}', github.event.project_card.id, github.event.project_card.column_name) || '' }}
            
            Actor: ${{ github.actor }}
            [Link to Action Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
